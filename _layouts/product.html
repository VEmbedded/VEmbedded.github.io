<!DOCTYPE html>
<html lang="en">

  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VRJGRW0PDD"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-VRJGRW0PDD');
    </script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="icon" href="/assets/images/favicon.ico" type="image/x-icon">
    <title>{{ page.title }}</title>

    <!-- Stylesheets -->
    <!--<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">-->
    <link href="/assets/css/styles.css" rel="stylesheet">
    <link href="/assets/css/carousel.css" rel="stylesheet">

    {% seo %}

    <!-- JSON-LD Schema for Product -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Product",
        "name": "{{ page.title }}",
        "image": "{{ page.image }}",
        "description": "{{ page.description }}",
        "offers": {
          "@type": "Offer",
          "url": "{{ page.url }}",
          "priceCurrency": "USD",
          "price": "{{ page.price }}"
        }
      }
    </script>

  </head>

  <body class="bg-info">

    <!-- Header with Logo and Navigation -->
    <header>
      {% include navigation.html %}
    </header>

    <!-- Main Content -->
    <main>
      <div class="container mt-5">
        <nav style="--bs-breadcrumb-divider: '>';" aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/products/">Products</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ page.title }}</li>
          </ol>
        </nav>

        <div class="container py-5 mt-5">
          <div class="pricing-header p-3 pb-md-4 mx-auto text-center">
            <h1 class="display-4 fw-normal text-body-emphasis">{{ page.title }}</h1>
            <!-- <img class="img-fluid mx-auto py-3" preserveAspectRatio="xMidYMid slice" focusable="false" src="{{ page.image }}" width="700" height="500"> -->
            <p class="fs-5 text-body-secondary">{{ page.description }}</p>
          </div>

          <div class="pricing-header p-3 pb-md-4 mx-auto text-center">
            <h1 class="display-6 fw-normal text-body-emphasis">Features</h1>
            <ul class="fs-5 text-body-secondary list-unstyled mt-3 mb-4">
              {% for feature in page.features %}
                <li>{{ feature }}</li>
              {% endfor %}
            </ul>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    {% include footer.html %}

    <!-- Bootstrap Bundle JS -->
    <script src="/assets/js/bootstrap.bundle.min.js"></script>

  </body>

</html>
